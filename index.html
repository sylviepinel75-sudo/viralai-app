<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Viral AI App</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 90%;
      max-width: 600px;
      background: #1e293b;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      color: #38bdf8;
    }

    textarea {
      width: 100%;
      height: 120px;
      border-radius: 10px;
      border: none;
      padding: 10px;
      font-size: 16px;
      outline: none;
    }

    button {
      width: 100%;
      margin-top: 10px;
      padding: 12px;
      background: #38bdf8;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #0ea5e9;
    }

    .output {
      margin-top: 20px;
      background: #0f172a;
      padding: 15px;
      border-radius: 10px;
      min-height: 80px;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>🔥 Viral AI App</h1>

  <textarea id="input" placeholder="Écris ton idée ici..."></textarea>

  <button onclick="generate()">Générer</button>

  <div class="output" id="output">Résultat ici...</div>
</div>

<script>
async function generate() {
  const input = document.getElementById("input").value;
  const output = document.getElementById("output");

  if (!input) {
    output.innerText = "Écris quelque chose d’abord 😉";
    return;
  }

  output.innerText = "Chargement... 🤖";

  // Version SIMPLIFIÉE (sans API payante)
  setTimeout(() => {
    output.innerText =
      "✨ Idée transformée :\n\n" +
      "Tu as écrit : " + input + "\n\n" +
      "👉 Version viral : " +
      input.toUpperCase() +
      " 🚀🔥 (imagine ici une vraie IA connectée plus tard)";
  }, 1200);
}
</script>

</body>
</html>
